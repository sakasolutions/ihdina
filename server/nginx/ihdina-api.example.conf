# Beispiel: Nginx als TLS-Terminator vor der Ihdina-API (Node auf 127.0.0.1:3001).
# Nicht ungeprüft übernehmen — Pfade, server_name, SSL-Zertifikate anpassen.
#
# Typisch: Datei unter /etc/nginx/sites-available/ihdina-api einbinden:
#   sudo ln -sf /etc/nginx/sites-available/ihdina-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream ihdina_api_upstream {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ihdina.app;

    # ssl_certificate     /etc/letsencrypt/live/api.ihdina.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.ihdina.app/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 2m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://ihdina_api_upstream;
    }
}

