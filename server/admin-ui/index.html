<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ihdina Admin</title>
  <style>
    :root {
      --bg: #0a1a14;
      --card: #0f2018;
      --border: rgba(255, 255, 255, 0.08);
      --gold: #c8a96e;
      --text: rgba(255, 255, 255, 0.92);
      --text-2: rgba(255, 255, 255, 0.45);
      --ok: #6dbf7a;
      --warn: #d4a84b;
      --err: #e07a6a;
      --maxw: 1100px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
    }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 16px 48px; }

    /* Login */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px 24px;
    }
    .login-card .logo {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      margin: 0 0 6px;
      text-align: center;
    }
    .login-card .sub {
      text-align: center;
      color: var(--text-2);
      font-size: 0.84rem;
      margin: 0 0 22px;
    }
    label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-2);
      margin-bottom: 5px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 14px;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.25); }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-gold { background: var(--gold); color: #0a1a14; width: 100%; }
    .btn-gold:hover:not(:disabled) { filter: brightness(1.08); }
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
      font-size: 0.78rem;
      padding: 6px 12px;
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: rgba(255,255,255,0.18); }
    .form-err {
      display: none;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(224, 122, 106, 0.1);
      border: 1px solid rgba(224, 122, 106, 0.25);
      color: var(--err);
      font-size: 0.84rem;
    }
    .form-err.show { display: block; }

    /* Dashboard */
    #dashboard { display: none; }
    #dashboard.visible { display: block; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--gold);
      margin: 0;
    }
    .top-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .pill.ok { color: var(--ok); background: rgba(109, 191, 122, 0.1); }
    .pill.err { color: var(--err); background: rgba(224, 122, 106, 0.1); }
    .pill.idle { color: var(--text-2); }

    nav {
      display: flex;
      gap: 6px;
      margin: 16px 0 20px;
      flex-wrap: wrap;
    }
    nav button {
      background: var(--card);
      color: var(--text-2);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
    }
    nav button:hover { color: var(--text); }
    nav button.active {
      background: rgba(200, 169, 110, 0.15);
      color: var(--gold);
      border-color: rgba(200, 169, 110, 0.35);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 18px 16px;
      margin-bottom: 16px;
    }
    .card h2 { margin: 0 0 12px; font-size: 1rem; font-weight: 700; }
    .hint { color: var(--text-2); font-size: 0.82rem; margin: 0 0 12px; }

    .status-lines { list-style: none; margin: 0; padding: 0; }
    .status-lines li {
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.86rem;
      border: 1px solid var(--border);
    }
    .status-lines li.ok { background: rgba(109, 191, 122, 0.08); border-color: rgba(109, 191, 122, 0.2); color: var(--ok); }
    .status-lines li.warn { background: rgba(212, 168, 75, 0.08); border-color: rgba(212, 168, 75, 0.2); color: var(--warn); }
    .status-lines li.err { background: rgba(224, 122, 106, 0.08); border-color: rgba(224, 122, 106, 0.2); color: var(--err); }
    .status-lines li.info { background: rgba(255, 255, 255, 0.03); color: var(--text); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 560px) { .kpi-grid { grid-template-columns: 1fr; } }
    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .kpi .val { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .kpi .val.gold { color: var(--gold); }
    .kpi .lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); margin-top: 6px; }
    .kpi .sub { font-size: 0.76rem; color: var(--text-2); margin-top: 4px; }
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .badge.ok { background: rgba(109, 191, 122, 0.2); color: var(--ok); }
    .badge.warn { background: rgba(212, 168, 75, 0.2); color: var(--warn); }
    .badge.err { background: rgba(224, 122, 106, 0.2); color: var(--err); }

    .chart-wrap { position: relative; height: 260px; margin-top: 8px; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
    .table-toolbar {
      justify-content: flex-end;
      margin-top: 4px;
      margin-bottom: 8px;
    }
    .table-toolbar label {
      margin: 0;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.82rem;
    }
    .table-toolbar select {
      width: auto;
      min-width: 88px;
      margin: 0;
    }
    .pagination-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .pagination-info { margin: 0; font-size: 0.82rem; }

    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 640px; }
    th, td { text-align: left; padding: 9px 11px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th {
      color: var(--text-2);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: rgba(255, 255, 255, 0.03); }
    tr.sum-row td { font-weight: 700; color: var(--gold); background: rgba(200, 169, 110, 0.06); }
    .mono { font-family: ui-monospace, monospace; font-size: 0.76rem; }
    .empty { color: var(--text-2); padding: 16px 0; font-size: 0.88rem; }
    .panel-err {
      display: none;
      color: var(--err);
      font-size: 0.84rem;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(224, 122, 106, 0.08);
      border: 1px solid rgba(224, 122, 106, 0.2);
      margin-bottom: 12px;
    }
    .panel-err.show { display: block; }

    .thumb-rating { font-size: 1.15rem; line-height: 1; }
    .thumb-rating.up { color: var(--ok); }
    .thumb-rating.down { color: var(--err); }

    .detail-panel { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      font-size: 0.84rem;
      margin-bottom: 14px;
    }
    @media (max-width: 560px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-grid dt { color: var(--text-2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .detail-grid dd { margin: 2px 0 8px; word-break: break-all; }

    footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-2);
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1 class="logo">Ihdina Admin</h1>
      <p class="sub">Internes Dashboard</p>
      <label for="loginKey">Zugangsschlüssel</label>
      <input id="loginKey" type="password" placeholder="Schlüssel eingeben" autocomplete="current-password" />
      <div id="loginErr" class="form-err" role="alert">Zugangsschlüssel ungültig</div>
      <button type="button" class="btn btn-gold" id="btnLogin">Einloggen</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="wrap">
    <header class="top-bar">
      <h1 class="logo">Ihdina Admin</h1>
      <div class="top-right">
        <span id="healthPill" class="pill idle">Status …</span>
        <button type="button" class="btn btn-ghost" id="btnLogout">Abmelden</button>
      </div>
    </header>

    <nav id="nav" aria-label="Navigation">
      <button type="button" class="active" data-tab="overview">Übersicht</button>
      <button type="button" data-tab="ki">KI &amp; Kosten</button>
      <button type="button" data-tab="users">Nutzer</button>
      <button type="button" data-tab="feedback">Feedback</button>
    </nav>

    <div id="panel-overview" class="panel active">
      <section class="card">
        <h2>Auf einen Blick</h2>
        <ul id="statusLines" class="status-lines">
          <li class="info">Daten werden geladen …</li>
        </ul>
      </section>

      <div class="kpi-grid" id="kpiGrid"></div>

      <section class="card">
        <div class="row">
          <h2 style="margin:0;flex:1">KI-Volumen (14 Tage)</h2>
          <button type="button" class="btn btn-gold" id="btnOverview" style="width:auto">Daten laden</button>
        </div>
        <div id="overviewErr" class="panel-err"></div>
        <div class="chart-wrap"><canvas id="chLineAi"></canvas></div>
      </section>
    </div>

    <div id="panel-ki" class="panel">
      <section class="card">
        <h2>KI-Einzelereignisse</h2>
        <div class="row">
          <div style="min-width:140px;flex:1">
            <label for="kiEpFilter">Endpoint</label>
            <select id="kiEpFilter">
              <option value="">Alle</option>
              <option value="explain">explain</option>
              <option value="follow-up">follow-up</option>
              <option value="takeaway">takeaway</option>
              <option value="reflection-moment">reflection-moment</option>
            </select>
          </div>
          <div style="min-width:120px;flex:1">
            <label for="kiStatusFilter">Status</label>
            <select id="kiStatusFilter">
              <option value="">Alle</option>
              <option value="ok">ok</option>
              <option value="error">error</option>
            </select>
          </div>
          <div style="min-width:120px;flex:1">
            <label for="kiHoursFilter">Zeitraum</label>
            <select id="kiHoursFilter">
              <option value="24">24h</option>
              <option value="168" selected>7 Tage</option>
              <option value="720">30 Tage</option>
            </select>
          </div>
          <div style="min-width:180px;flex:2">
            <label for="kiUserFilter">User</label>
            <input id="kiUserFilter" type="text" placeholder="Name oder Geräte-ID …" style="margin:0" autocomplete="off" />
          </div>
          <button type="button" class="btn btn-gold" id="btnKi" style="width:auto;align-self:flex-end">Anwenden</button>
        </div>
        <div id="kiErr" class="panel-err"></div>
        <div id="kiSummary" class="kpi-grid"></div>
        <div class="row table-toolbar">
          <label for="kiPageSize">Anzeigen:</label>
          <select id="kiPageSize">
            <option value="10" selected>10</option>
            <option value="25">25</option>
            <option value="100">100</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
          </select>
        </div>
        <div id="kiTable"></div>
        <div id="kiPagination"></div>
      </section>
    </div>

    <div id="panel-users" class="panel">
      <section class="card">
        <h2>Nutzer</h2>
        <p class="hint">Alle Geräte — Suche nach Name oder Geräte-ID.</p>
        <div class="row">
          <input id="userQ" type="text" placeholder="Name oder Geräte-ID …" style="flex:1;min-width:200px;margin:0" autocomplete="off" />
        </div>
        <div id="userSearchErr" class="panel-err"></div>
        <div class="row table-toolbar">
          <label for="usersPageSize">Anzeigen:</label>
          <select id="usersPageSize">
            <option value="10" selected>10</option>
            <option value="25">25</option>
            <option value="100">100</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
          </select>
        </div>
        <div id="userResults"></div>
        <div id="userPagination"></div>
        <div id="userDetail" class="detail-panel" style="display:none"></div>
      </section>
    </div>

    <div id="panel-feedback" class="panel">
      <section class="card">
        <div class="row">
          <h2 style="margin:0;flex:1">Letzte Feedbacks</h2>
          <button type="button" class="btn btn-gold" id="btnFeedback" style="width:auto">Daten laden</button>
        </div>
        <div id="fbErr" class="panel-err"></div>
        <div class="row table-toolbar">
          <label for="fbPageSize">Anzeigen:</label>
          <select id="fbPageSize">
            <option value="10" selected>10</option>
            <option value="25">25</option>
            <option value="100">100</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
          </select>
        </div>
        <div id="fbTable"></div>
        <div id="fbPagination"></div>
      </section>
    </div>

    <footer><p>Ihdina Admin</p></footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    (function () {
      const LS_API = "ihdina_admin_api_base";
      const LS_KEY = "ihdina_admin_key";

      const $ = (id) => document.getElementById(id);

      let sessionKey = "";
      let authenticated = false;
      let chLineAi = null;
      const kiUserMeta = {};
      let feedbackItems = [];
      let fbSortAsc = false;
      let fbPage = 1;
      let selectedInstallId = "";
      let usersPage = 1;
      let userSearchTimer = null;
      let kiItemsAll = [];
      let kiTruncated = false;
      let kiPage = 1;

      function apiBase() {
        const stored = localStorage.getItem(LS_API);
        if (stored && stored.trim()) return stored.trim().replace(/\/$/, "");
        return window.location.origin;
      }

      function adminHeaders(jsonBody) {
        const h = { Accept: "application/json", "X-Admin-Key": sessionKey };
        if (jsonBody) h["Content-Type"] = "application/json";
        return h;
      }

      function showLoginErr(on, msg) {
        const el = $("loginErr");
        if (msg) el.textContent = msg;
        el.classList.toggle("show", !!on);
      }

      function showPanelErr(id, msg) {
        const el = $(id);
        el.textContent = msg || "";
        el.classList.toggle("show", !!msg);
      }

      function isAuthError(res, msg) {
        if (res && res.status === 401) return true;
        return String(msg || "").toLowerCase().includes("unauthorized");
      }

      async function fetchJson(path, opts) {
        opts = opts || {};
        if (!sessionKey) throw new Error("Nicht angemeldet");
        const url = apiBase() + path;
        const res = await fetch(url, {
          method: opts.method || "GET",
          headers: adminHeaders(!!opts.body),
          body: opts.body != null ? opts.body : undefined,
        });
        const text = await res.text();
        let json;
        try { json = JSON.parse(text); } catch (_) { json = null; }
        if (!res.ok) {
          const m = json?.error?.message || json?.message || text || res.statusText;
          if (isAuthError(res, m)) logout(true);
          throw new Error(m || "HTTP " + res.status);
        }
        if (!json || json.success !== true) throw new Error("Ungültige Antwort");
        return json.data;
      }

      async function testKey(key) {
        const url = apiBase() + "/api/v1/admin/usage/daily?days=1";
        const res = await fetch(url, {
          headers: { Accept: "application/json", "X-Admin-Key": key },
        });
        const text = await res.text();
        let json;
        try { json = JSON.parse(text); } catch (_) { json = null; }
        if (!res.ok) {
          const m = json?.error?.message || text || res.statusText;
          return { ok: false, message: isAuthError(res, m) ? "Zugangsschlüssel ungültig" : m || "Verbindung fehlgeschlagen" };
        }
        if (!json || json.success !== true) return { ok: false, message: "Ungültige Antwort" };
        return { ok: true };
      }

      function showLogin() {
        authenticated = false;
        sessionKey = "";
        $("loginScreen").style.display = "flex";
        $("dashboard").classList.remove("visible");
        const saved = localStorage.getItem(LS_KEY) || "";
        $("loginKey").value = saved;
        showLoginErr(false);
      }

      function showDashboard() {
        authenticated = true;
        $("loginScreen").style.display = "none";
        $("dashboard").classList.add("visible");
        checkHealth();
        loadOverview();
      }

      function logout(sessionExpired) {
        authenticated = false;
        sessionKey = "";
        destroyChart();
        $("loginScreen").style.display = "flex";
        $("dashboard").classList.remove("visible");
        $("loginKey").value = localStorage.getItem(LS_KEY) || "";
        if (sessionExpired) showLoginErr(true, "Sitzung abgelaufen — bitte erneut einloggen");
      }

      async function login() {
        const key = $("loginKey").value.trim();
        showLoginErr(false);
        if (!key) {
          showLoginErr(true, "Bitte Zugangsschlüssel eingeben");
          return;
        }
        const btn = $("btnLogin");
        btn.disabled = true;
        btn.textContent = "Prüfe …";
        try {
          const result = await testKey(key);
          if (!result.ok) {
            showLoginErr(true, result.message);
            return;
          }
          sessionKey = key;
          localStorage.setItem(LS_KEY, key);
          showDashboard();
        } finally {
          btn.disabled = false;
          btn.textContent = "Einloggen";
        }
      }

      async function tryAutoLogin() {
        const key = localStorage.getItem(LS_KEY);
        if (!key || !key.trim()) return;
        $("loginKey").value = key;
        const btn = $("btnLogin");
        btn.disabled = true;
        btn.textContent = "Prüfe …";
        try {
          const result = await testKey(key.trim());
          if (result.ok) {
            sessionKey = key.trim();
            showDashboard();
          }
        } finally {
          btn.disabled = false;
          btn.textContent = "Einloggen";
        }
      }

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
        );
      }

      function fmt(n) { return Number(n).toLocaleString("de-DE"); }
      function pct(rate) { return (Number(rate) * 100).toFixed(1).replace(".", ",") + " %"; }
      function shortId(id) {
        if (!id || id.length <= 16) return id || "—";
        return id.slice(0, 8) + "…" + id.slice(-4);
      }
      function shortInstallId8(id) {
        if (!id) return "—";
        return id.length <= 8 ? id : id.slice(0, 8) + "…";
      }
      function fmtDate(iso) {
        if (!iso) return "—";
        try { return new Date(iso).toLocaleString("de-DE", { dateStyle: "short", timeStyle: "short" }); }
        catch (_) { return iso; }
      }
      function errorBadgeClass(rate) {
        const p = Number(rate) * 100;
        if (p >= 5) return "err";
        if (p >= 2) return "warn";
        return "ok";
      }
      function destroyChart() {
        try { chLineAi && chLineAi.destroy(); } catch (_) {}
        chLineAi = null;
      }

      function readPageSize(selectId) {
        const n = Number.parseInt($(selectId).value, 10);
        return [10, 25, 100, 500, 1000].includes(n) ? n : 10;
      }

      function totalPagesFor(count, pageSize) {
        if (!count || count <= 0) return 0;
        return Math.ceil(count / pageSize);
      }

      function paginateSlice(items, page, pageSize) {
        const pages = totalPagesFor(items.length, pageSize);
        const safePage = pages > 0 ? Math.min(Math.max(1, page), pages) : 1;
        const start = (safePage - 1) * pageSize;
        return { slice: items.slice(start, start + pageSize), page: safePage, pages };
      }

      function renderPagination(containerId, currentPage, totalPages, onPageChange) {
        const el = $(containerId);
        if (!el) return;
        const pages = Math.max(0, totalPages);
        if (pages <= 0) {
          el.innerHTML = "";
          return;
        }
        const page = Math.min(Math.max(1, currentPage), pages);
        el.innerHTML =
          "<div class='pagination-bar'>" +
          "<button type='button' class='btn btn-ghost' data-page='prev' style='width:auto'" + (page <= 1 ? " disabled" : "") + ">← Zurück</button>" +
          "<span class='hint pagination-info'>Seite " + page + " von " + pages + "</span>" +
          "<button type='button' class='btn btn-ghost' data-page='next' style='width:auto'" + (page >= pages ? " disabled" : "") + ">Weiter →</button>" +
          "</div>";
        const prev = el.querySelector("[data-page='prev']");
        const next = el.querySelector("[data-page='next']");
        if (prev && page > 1) prev.onclick = () => onPageChange(page - 1);
        if (next && page < pages) next.onclick = () => onPageChange(page + 1);
      }

      function positiveFeedbackPct(fb) {
        if (fb.positiveCount != null && fb.negativeCount != null) {
          const total = fb.positiveCount + fb.negativeCount;
          if (total <= 0) return null;
          return (fb.positiveCount / total) * 100;
        }
        const avg = fb.avgRatingLast7d;
        if (avg == null || !fb.withRatingLast7d) return null;
        return ((avg + 1) / 2) * 100;
      }

      function formatPositiveKpi(fb) {
        const p = positiveFeedbackPct(fb);
        if (p == null) return { val: "—", sub: "Keine Daumen-Bewertungen (7 T.)" };
        return {
          val: p.toFixed(0).replace(".", ",") + " % positiv",
          sub: fmt(fb.withRatingLast7d) + " Bewertungen (7 T.)",
        };
      }

        lines.push({

      const KI_COST_RATES = {
        "gpt-4o-mini": { input: 0.15, output: 0.6 },
        "gpt-4o": { input: 2.5, output: 10 },
        "gpt-4.1-mini": { input: 0.4, output: 1.6 },
        "gpt-4.1": { input: 1.0, output: 4.0 },
        "gpt-5-mini": { input: 0.45, output: 3.6 },
        "gpt-5": { input: 2.5, output: 20 },
        "o3-mini": { input: 1.1, output: 4.4 },
        "o4-mini": { input: 1.1, output: 4.4 },
      };
      const KI_COST_FALLBACK = "gpt-4o-mini";
      const KI_EVENTS_MAX_PAGES = 30;

      function normalizeKiModelKey(model) {
        const t = String(model || "").trim().toLowerCase();
        if (!t) return KI_COST_FALLBACK;
        const keys = Object.keys(KI_COST_RATES).sort((a, b) => b.length - a.length);
        for (const k of keys) {
          if (t === k || t.startsWith(k + "-") || t.startsWith(k + "_")) return k;
        }
        return KI_COST_FALLBACK;
      }

      function estimateKiEventCostUsd(item) {
        const key = normalizeKiModelKey(item.model);
        const rates = KI_COST_RATES[key] || KI_COST_RATES[KI_COST_FALLBACK];
        const p = Math.max(0, Number(item.promptTokens) || 0);
        const c = Math.max(0, Number(item.completionTokens) || 0);
        return (p / 1_000_000) * rates.input + (c / 1_000_000) * rates.output;
      }

      function kiEventUserLabel(item) {
        const iid = item.installId;
        if (!iid) return "anonym";
        const name = String(kiUserMeta[iid] || "").trim();
        if (name) return escapeHtml(name);
        return escapeHtml(shortInstallId8(iid));
      }

      async function enrichKiUserMeta(installIds) {
        const missing = installIds.filter((id) => id && !(id in kiUserMeta));
        if (!missing.length) return;
        await Promise.all(
          missing.map(async (id) => {
            try {
              const data = await fetchJson("/api/v1/admin/users/" + encodeURIComponent(id));
              kiUserMeta[id] = data.user?.displayName || "";
            } catch (_) {
              kiUserMeta[id] = "";
            }
          })
        );
      }

      async function fetchKiEventsPages(params) {
        const pageSize = 100;
        let page = 0;
        let all = [];
        let truncated = false;
        while (page < KI_EVENTS_MAX_PAGES) {
          const qs = new URLSearchParams({
            page: String(page),
            pageSize: String(pageSize),
            hours: String(params.hours),
          });
          if (params.endpoint) qs.set("endpoint", params.endpoint);
          if (params.status) qs.set("status", params.status);
          if (params.installId) qs.set("installId", params.installId);
          const data = await fetchJson("/api/v1/admin/usage/events?" + qs.toString());
          const items = data.items || [];
          all = all.concat(items);
          if (!data.hasMore) break;
          page += 1;
          if (page >= KI_EVENTS_MAX_PAGES) truncated = true;
        }
        return { items: all, truncated };
      }

      function filterKiEventsByUser(items, userQ, matchedUsers) {
        if (!userQ) return items;
        const qLower = userQ.toLowerCase();
        const matchedIds = new Set((matchedUsers || []).map((u) => u.installId));
        return items.filter((item) => {
          const iid = item.installId || "";
          if (matchedIds.size && matchedIds.has(iid)) return true;
          if (iid && iid.toLowerCase().includes(qLower)) return true;
          const name = String(kiUserMeta[iid] || "").trim().toLowerCase();
          return name.includes(qLower);
        });
      }

      function renderKiSummary(items) {
        let calls = items.length;
        let errors = 0;
        let costUsd = 0;
        for (const item of items) {
          if (item.status === "error") errors += 1;
          costUsd += estimateKiEventCostUsd(item);
        }
        const errRate = calls > 0 ? errors / calls : 0;
        const errCls = errorBadgeClass(errRate);
        $("kiSummary").innerHTML =
          "<div class='kpi'><div class='val gold'>" + fmt(calls) + "</div><div class='lbl'>Calls gesamt</div><div class='sub'>Im gewählten Zeitraum &amp; Filter</div></div>" +
          "<div class='kpi'><div class='val'>" + fmt(errors) + "<span class='badge " + errCls + "'>" + pct(errRate) + "</span></div><div class='lbl'>Fehler</div><div class='sub'>Fehlerquote im Filter</div></div>" +
          "<div class='kpi'><div class='val'>" + costUsd.toFixed(4) + "</div><div class='lbl'>Kosten USD ~</div><div class='sub'>Geschätzt aus Token-Sätzen</div></div>";
      }

      function renderKiEventsTable(items) {
        if (!items.length) {
          $("kiTable").innerHTML = "<p class='empty'>Keine Ereignisse im gewählten Filter.</p>";
          return;
        }
        let html = "";
        if (kiTruncated) {
          html += "<p class='hint'>Daten begrenzt auf " + fmt(KI_EVENTS_MAX_PAGES * 100) + " Ereignisse — Filter enger setzen für vollständige Auswertung.</p>";
        }
        html += "<div class='table-wrap'><table><thead><tr><th>Datum</th><th>User</th><th>Endpoint</th><th>Status</th><th>Tokens</th><th>Kosten USD</th><th>Fehlercode</th></tr></thead><tbody>";
        for (const item of items) {
          const tokens = item.totalTokens ?? ((Number(item.promptTokens) || 0) + (Number(item.completionTokens) || 0));
          const cost = estimateKiEventCostUsd(item);
          const errCode = item.errorCode ? escapeHtml(item.errorCode) : "—";
          const statusCls = item.status === "error" ? " style='color:var(--err)'" : item.status === "ok" ? " style='color:var(--ok)'" : "";
          html +=
            "<tr><td class='mono'>" + escapeHtml(fmtDate(item.createdAt)) + "</td>" +
            "<td title='" + escapeHtml(item.installId || "") + "'>" + kiEventUserLabel(item) + "</td>" +
            "<td class='mono'>" + escapeHtml(item.endpoint) + "</td>" +
            "<td" + statusCls + ">" + escapeHtml(item.status || "—") + "</td>" +
            "<td>" + fmt(tokens) + "</td>" +
            "<td>" + cost.toFixed(6) + "</td>" +
            "<td class='mono'>" + errCode + "</td></tr>";
        }
        html += "</tbody></table></div>";
        $("kiTable").innerHTML = html;
      }

      function renderKiPage() {
        const pageSize = readPageSize("kiPageSize");
        const { slice, page, pages } = paginateSlice(kiItemsAll, kiPage, pageSize);
        kiPage = page;
        renderKiEventsTable(slice);
        renderPagination("kiPagination", kiPage, pages, (p) => {
          kiPage = p;
          renderKiPage();
        });
      }

      async function loadKi() {
        if (!authenticated) return;
        showPanelErr("kiErr", "");
        const btn = $("btnKi");
        btn.disabled = true;
        $("kiSummary").innerHTML = "";
        $("kiTable").innerHTML = "<p class='hint'>Lade KI-Ereignisse …</p>";
        $("kiPagination").innerHTML = "";
        try {
          const hours = Number.parseInt($("kiHoursFilter").value, 10) || 168;
          const endpoint = $("kiEpFilter").value.trim();
          const status = $("kiStatusFilter").value.trim();
          const userQ = $("kiUserFilter").value.trim();

          let matchedUsers = [];
          if (userQ) {
            try {
              const userData = await fetchJson(
                "/api/v1/admin/users?q=" + encodeURIComponent(userQ) + "&pageSize=100"
              );
              matchedUsers = userData.users || [];
              for (const u of matchedUsers) {
                kiUserMeta[u.installId] = u.displayName || "";
              }
            } catch (_) {
              matchedUsers = [];
            }
          }

          const fetchParams = { hours, endpoint, status };
          if (matchedUsers.length === 1) {
            fetchParams.installId = matchedUsers[0].installId;
          }

          const { items: rawItems, truncated } = await fetchKiEventsPages(fetchParams);

          const uniqueIds = [...new Set(rawItems.map((i) => i.installId).filter(Boolean))];
          await enrichKiUserMeta(uniqueIds);

          kiItemsAll = filterKiEventsByUser(rawItems, userQ, matchedUsers);
          kiTruncated = truncated;
          kiPage = 1;

          renderKiSummary(kiItemsAll);
          renderKiPage();
        } catch (e) {
          if (authenticated) {
            showPanelErr("kiErr", String(e.message || e));
            $("kiSummary").innerHTML = "";
            $("kiTable").innerHTML = "";
            $("kiPagination").innerHTML = "";
            kiItemsAll = [];
          }
        } finally {
          btn.disabled = false;
        }
      }

          if (tab === "users") loadUsers(1);
          if (tab === "ki") loadKi();
          if (tab === "feedback" && !feedbackItems.length) loadFeedback();
        });
      });

      $("btnLogin").onclick = login;
      $("loginKey").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
      $("btnLogout").onclick = () => logout(false);
      $("btnOverview").onclick = loadOverview;
      $("btnKi").onclick = loadKi;
      $("kiPageSize").onchange = () => { kiPage = 1; renderKiPage(); };
      $("kiUserFilter").addEventListener("keydown", (e) => { if (e.key === "Enter") loadKi(); });
      $("usersPageSize").onchange = () => loadUsers(1);
      $("userQ").addEventListener("input", () => {
        clearTimeout(userSearchTimer);
        userSearchTimer = setTimeout(() => loadUsers(1), 300);
      });
      $("fbPageSize").onchange = () => { fbPage = 1; renderFeedbackPage(); };
      $("btnFeedback").onclick = loadFeedback;

      tryAutoLogin();
    })();
  </script>
</body>
</html>
