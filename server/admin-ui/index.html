<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ihdina Admin</title>
  <style>
    :root {
      --bg: #0a1a14;
      --card: #0f2018;
      --border: rgba(255, 255, 255, 0.08);
      --gold: #c8a96e;
      --text: rgba(255, 255, 255, 0.92);
      --text-2: rgba(255, 255, 255, 0.45);
      --ok: #6dbf7a;
      --warn: #d4a84b;
      --err: #e07a6a;
      --maxw: 1100px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
    }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 16px 48px; }

    /* Login */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px 24px;
    }
    .login-card .logo {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      margin: 0 0 6px;
      text-align: center;
    }
    .login-card .sub {
      text-align: center;
      color: var(--text-2);
      font-size: 0.84rem;
      margin: 0 0 22px;
    }
    label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-2);
      margin-bottom: 5px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 14px;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.25); }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-gold { background: var(--gold); color: #0a1a14; width: 100%; }
    .btn-gold:hover:not(:disabled) { filter: brightness(1.08); }
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
      font-size: 0.78rem;
      padding: 6px 12px;
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: rgba(255,255,255,0.18); }
    .form-err {
      display: none;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(224, 122, 106, 0.1);
      border: 1px solid rgba(224, 122, 106, 0.25);
      color: var(--err);
      font-size: 0.84rem;
    }
    .form-err.show { display: block; }

    /* Dashboard */
    #dashboard { display: none; }
    #dashboard.visible { display: block; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--gold);
      margin: 0;
    }
    .top-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .pill.ok { color: var(--ok); background: rgba(109, 191, 122, 0.1); }
    .pill.err { color: var(--err); background: rgba(224, 122, 106, 0.1); }
    .pill.idle { color: var(--text-2); }

    nav {
      display: flex;
      gap: 6px;
      margin: 16px 0 20px;
      flex-wrap: wrap;
    }
    nav button {
      background: var(--card);
      color: var(--text-2);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
    }
    nav button:hover { color: var(--text); }
    nav button.active {
      background: rgba(200, 169, 110, 0.15);
      color: var(--gold);
      border-color: rgba(200, 169, 110, 0.35);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 18px 16px;
      margin-bottom: 16px;
    }
    .card h2 { margin: 0 0 12px; font-size: 1rem; font-weight: 700; }
    .hint { color: var(--text-2); font-size: 0.82rem; margin: 0 0 12px; }

    .status-lines { list-style: none; margin: 0; padding: 0; }
    .status-lines li {
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.86rem;
      border: 1px solid var(--border);
    }
    .status-lines li.ok { background: rgba(109, 191, 122, 0.08); border-color: rgba(109, 191, 122, 0.2); color: var(--ok); }
    .status-lines li.warn { background: rgba(212, 168, 75, 0.08); border-color: rgba(212, 168, 75, 0.2); color: var(--warn); }
    .status-lines li.err { background: rgba(224, 122, 106, 0.08); border-color: rgba(224, 122, 106, 0.2); color: var(--err); }
    .status-lines li.info { background: rgba(255, 255, 255, 0.03); color: var(--text); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 560px) { .kpi-grid { grid-template-columns: 1fr; } }
    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .kpi .val { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .kpi .val.gold { color: var(--gold); }
    .kpi .lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); margin-top: 6px; }
    .kpi .sub { font-size: 0.76rem; color: var(--text-2); margin-top: 4px; }
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .badge.ok { background: rgba(109, 191, 122, 0.2); color: var(--ok); }
    .badge.warn { background: rgba(212, 168, 75, 0.2); color: var(--warn); }
    .badge.err { background: rgba(224, 122, 106, 0.2); color: var(--err); }

    .chart-wrap { position: relative; height: 260px; margin-top: 8px; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }

    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 640px; }
    th, td { text-align: left; padding: 9px 11px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th {
      color: var(--text-2);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: rgba(255, 255, 255, 0.03); }
    tr.sum-row td { font-weight: 700; color: var(--gold); background: rgba(200, 169, 110, 0.06); }
    .mono { font-family: ui-monospace, monospace; font-size: 0.76rem; }
    .empty { color: var(--text-2); padding: 16px 0; font-size: 0.88rem; }
    .panel-err {
      display: none;
      color: var(--err);
      font-size: 0.84rem;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(224, 122, 106, 0.08);
      border: 1px solid rgba(224, 122, 106, 0.2);
      margin-bottom: 12px;
    }
    .panel-err.show { display: block; }

    .thumb-rating { font-size: 1.15rem; line-height: 1; }
    .thumb-rating.up { color: var(--ok); }
    .thumb-rating.down { color: var(--err); }

    .detail-panel { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      font-size: 0.84rem;
      margin-bottom: 14px;
    }
    @media (max-width: 560px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-grid dt { color: var(--text-2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .detail-grid dd { margin: 2px 0 8px; word-break: break-all; }

    footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-2);
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1 class="logo">Ihdina Admin</h1>
      <p class="sub">Internes Dashboard</p>
      <label for="loginKey">Zugangsschlüssel</label>
      <input id="loginKey" type="password" placeholder="Schlüssel eingeben" autocomplete="current-password" />
      <div id="loginErr" class="form-err" role="alert">Zugangsschlüssel ungültig</div>
      <button type="button" class="btn btn-gold" id="btnLogin">Einloggen</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="wrap">
    <header class="top-bar">
      <h1 class="logo">Ihdina Admin</h1>
      <div class="top-right">
        <span id="healthPill" class="pill idle">Status …</span>
        <button type="button" class="btn btn-ghost" id="btnLogout">Abmelden</button>
      </div>
    </header>

    <nav id="nav" aria-label="Navigation">
      <button type="button" class="active" data-tab="overview">Übersicht</button>
      <button type="button" data-tab="ki">KI &amp; Kosten</button>
      <button type="button" data-tab="users">Nutzer</button>
      <button type="button" data-tab="feedback">Feedback</button>
    </nav>

    <div id="panel-overview" class="panel active">
      <section class="card">
        <h2>Auf einen Blick</h2>
        <ul id="statusLines" class="status-lines">
          <li class="info">Daten werden geladen …</li>
        </ul>
      </section>

      <div class="kpi-grid" id="kpiGrid"></div>

      <section class="card">
        <div class="row">
          <h2 style="margin:0;flex:1">KI-Volumen (14 Tage)</h2>
          <button type="button" class="btn btn-gold" id="btnOverview" style="width:auto">Daten laden</button>
        </div>
        <div id="overviewErr" class="panel-err"></div>
        <div class="chart-wrap"><canvas id="chLineAi"></canvas></div>
      </section>
    </div>

    <div id="panel-ki" class="panel">
      <section class="card">
        <h2>Tagesaggregate (14 Tage)</h2>
        <div class="row">
          <div style="min-width:200px;flex:1">
            <label for="epFilter">Endpoint</label>
            <select id="epFilter"><option value="">Alle Endpoints</option></select>
          </div>
          <button type="button" class="btn btn-gold" id="btnKi" style="width:auto;align-self:flex-end">Daten laden</button>
        </div>
        <div id="kiErr" class="panel-err"></div>
        <div id="kiTable"></div>
      </section>
    </div>

    <div id="panel-users" class="panel">
      <section class="card">
        <h2>Nutzer suchen</h2>
        <p class="hint">Suche nach Geräte-ID (installId).</p>
        <div class="row">
          <input id="userQ" type="text" placeholder="Geräte-ID oder Teil davon" style="flex:1;min-width:200px;margin:0" />
          <button type="button" class="btn btn-gold" id="btnUserSearch" style="width:auto">Laden</button>
        </div>
        <div id="userSearchErr" class="panel-err"></div>
        <div id="userResults"></div>
        <div id="userDetail" class="detail-panel" style="display:none"></div>
      </section>
    </div>

    <div id="panel-feedback" class="panel">
      <section class="card">
        <div class="row">
          <h2 style="margin:0;flex:1">Letzte Feedbacks</h2>
          <button type="button" class="btn btn-gold" id="btnFeedback" style="width:auto">Daten laden</button>
        </div>
        <div id="fbErr" class="panel-err"></div>
        <div id="fbTable"></div>
      </section>
    </div>

    <footer><p>Ihdina Admin</p></footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    (function () {
      const LS_API = "ihdina_admin_api_base";
      const LS_KEY = "ihdina_admin_key";

      const $ = (id) => document.getElementById(id);

      let sessionKey = "";
      let authenticated = false;
      let chLineAi = null;
      let kiRowsRaw = [];
      let feedbackItems = [];
      let fbSortAsc = false;
      let selectedInstallId = "";

      function apiBase() {
        const stored = localStorage.getItem(LS_API);
        if (stored && stored.trim()) return stored.trim().replace(/\/$/, "");
        return window.location.origin;
      }

      function adminHeaders(jsonBody) {
        const h = { Accept: "application/json", "X-Admin-Key": sessionKey };
        if (jsonBody) h["Content-Type"] = "application/json";
        return h;
      }

      function showLoginErr(on, msg) {
        const el = $("loginErr");
        if (msg) el.textContent = msg;
        el.classList.toggle("show", !!on);
      }

      function showPanelErr(id, msg) {
        const el = $(id);
        el.textContent = msg || "";
        el.classList.toggle("show", !!msg);
      }

      function isAuthError(res, msg) {
        if (res && res.status === 401) return true;
        return String(msg || "").toLowerCase().includes("unauthorized");
      }

      async function fetchJson(path, opts) {
        opts = opts || {};
        if (!sessionKey) throw new Error("Nicht angemeldet");
        const url = apiBase() + path;
        const res = await fetch(url, {
          method: opts.method || "GET",
          headers: adminHeaders(!!opts.body),
          body: opts.body != null ? opts.body : undefined,
        });
        const text = await res.text();
        let json;
        try { json = JSON.parse(text); } catch (_) { json = null; }
        if (!res.ok) {
          const m = json?.error?.message || json?.message || text || res.statusText;
          if (isAuthError(res, m)) logout(true);
          throw new Error(m || "HTTP " + res.status);
        }
        if (!json || json.success !== true) throw new Error("Ungültige Antwort");
        return json.data;
      }

      async function testKey(key) {
        const url = apiBase() + "/api/v1/admin/usage/daily?days=1";
        const res = await fetch(url, {
          headers: { Accept: "application/json", "X-Admin-Key": key },
        });
        const text = await res.text();
        let json;
        try { json = JSON.parse(text); } catch (_) { json = null; }
        if (!res.ok) {
          const m = json?.error?.message || text || res.statusText;
          return { ok: false, message: isAuthError(res, m) ? "Zugangsschlüssel ungültig" : m || "Verbindung fehlgeschlagen" };
        }
        if (!json || json.success !== true) return { ok: false, message: "Ungültige Antwort" };
        return { ok: true };
      }

      function showLogin() {
        authenticated = false;
        sessionKey = "";
        $("loginScreen").style.display = "flex";
        $("dashboard").classList.remove("visible");
        const saved = localStorage.getItem(LS_KEY) || "";
        $("loginKey").value = saved;
        showLoginErr(false);
      }

      function showDashboard() {
        authenticated = true;
        $("loginScreen").style.display = "none";
        $("dashboard").classList.add("visible");
        checkHealth();
        loadOverview();
      }

      function logout(sessionExpired) {
        authenticated = false;
        sessionKey = "";
        destroyChart();
        $("loginScreen").style.display = "flex";
        $("dashboard").classList.remove("visible");
        $("loginKey").value = localStorage.getItem(LS_KEY) || "";
        if (sessionExpired) showLoginErr(true, "Sitzung abgelaufen — bitte erneut einloggen");
      }

      async function login() {
        const key = $("loginKey").value.trim();
        showLoginErr(false);
        if (!key) {
          showLoginErr(true, "Bitte Zugangsschlüssel eingeben");
          return;
        }
        const btn = $("btnLogin");
        btn.disabled = true;
        btn.textContent = "Prüfe …";
        try {
          const result = await testKey(key);
          if (!result.ok) {
            showLoginErr(true, result.message);
            return;
          }
          sessionKey = key;
          localStorage.setItem(LS_KEY, key);
          showDashboard();
        } finally {
          btn.disabled = false;
          btn.textContent = "Einloggen";
        }
      }

      async function tryAutoLogin() {
        const key = localStorage.getItem(LS_KEY);
        if (!key || !key.trim()) return;
        $("loginKey").value = key;
        const btn = $("btnLogin");
        btn.disabled = true;
        btn.textContent = "Prüfe …";
        try {
          const result = await testKey(key.trim());
          if (result.ok) {
            sessionKey = key.trim();
            showDashboard();
          }
        } finally {
          btn.disabled = false;
          btn.textContent = "Einloggen";
        }
      }

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
        );
      }

      function fmt(n) { return Number(n).toLocaleString("de-DE"); }
      function pct(rate) { return (Number(rate) * 100).toFixed(1).replace(".", ",") + " %"; }
      function shortId(id) {
        if (!id || id.length <= 16) return id || "—";
        return id.slice(0, 8) + "…" + id.slice(-4);
      }
      function fmtDate(iso) {
        if (!iso) return "—";
        try { return new Date(iso).toLocaleString("de-DE", { dateStyle: "short", timeStyle: "short" }); }
        catch (_) { return iso; }
      }
      function errorBadgeClass(rate) {
        const p = Number(rate) * 100;
        if (p >= 5) return "err";
        if (p >= 2) return "warn";
        return "ok";
      }
      function destroyChart() {
        try { chLineAi && chLineAi.destroy(); } catch (_) {}
        chLineAi = null;
      }

      function positiveFeedbackPct(fb) {
        if (fb.positiveCount != null && fb.negativeCount != null) {
          const total = fb.positiveCount + fb.negativeCount;
          if (total <= 0) return null;
          return (fb.positiveCount / total) * 100;
        }
        const avg = fb.avgRatingLast7d;
        if (avg == null || !fb.withRatingLast7d) return null;
        return ((avg + 1) / 2) * 100;
      }

      function formatPositiveKpi(fb) {
        const p = positiveFeedbackPct(fb);
        if (p == null) return { val: "—", sub: "Keine Daumen-Bewertungen (7 T.)" };
        return {
          val: p.toFixed(0).replace(".", ",") + " % positiv",
          sub: fmt(fb.withRatingLast7d) + " Bewertungen (7 T.)",
        };
      }

      function buildStatusLines(o) {
        const lines = [];
        const errRate = o.ai.errorRateLast7d;
        const errPct = pct(errRate);
        if (errRate > 0.05) lines.push({ cls: "err", text: "KI-Fehlerquote erhöht: " + errPct });
        else lines.push({ cls: "ok", text: "Fehlerquote normal: " + errPct });
        lines.push({
          cls: "warn",
          text: o.users.newLast7d + " neue Geräte in den letzten 7 Tagen — erstmals Server-Kontakt (nicht gleich App-Installation).",
        });
        const posPct = positiveFeedbackPct(o.feedback);
        if (posPct != null) {
          lines.push({
            cls: "info",
            text:
              "Positives Feedback (7 Tage): " +
              posPct.toFixed(0).replace(".", ",") +
              " % positiv · " +
              fmt(o.feedback.withRatingLast7d) +
              " Daumen-Bewertungen",
          });
        } else {
          lines.push({ cls: "info", text: "Kein Feedback mit Daumen-Bewertung in den letzten 7 Tagen." });
        }
        $("statusLines").innerHTML = lines.map((l) => "<li class='" + l.cls + "'>" + escapeHtml(l.text) + "</li>").join("");
      }

      function renderKpis(o) {
        const errCls = errorBadgeClass(o.ai.errorRateLast7d);
        const errPct = pct(o.ai.errorRateLast7d);
        const posFb = formatPositiveKpi(o.feedback);
        $("kpiGrid").innerHTML =
          "<div class='kpi'><div class='val'>" + fmt(o.users.total) + "</div><div class='lbl'>Geräte mit Server-Kontakt</div><div class='sub'>" + fmt(o.users.pro) + " Pro · " + pct(o.users.proShare) + "</div></div>" +
          "<div class='kpi'><div class='val'>" + fmt(o.users.activeLast7d) + "</div><div class='lbl'>Aktive Geräte letzte 7 Tage</div><div class='sub'>Server-Kontakt in den letzten 7 Tagen</div></div>" +
          "<div class='kpi'><div class='val gold'>" + fmt(o.ai.requestsLast24h) + "</div><div class='lbl'>KI-Anfragen 24h</div><div class='sub'>7 Tage: " + fmt(o.ai.requestsLast7d) + "</div></div>" +
          "<div class='kpi'><div class='val'>" + errPct + "<span class='badge " + errCls + "'>" + (errCls === "ok" ? "OK" : errCls === "warn" ? "Achtung" : "Kritisch") + "</span></div><div class='lbl'>KI-Fehlerquote 7T</div><div class='sub'>" + fmt(o.ai.errorsLast7d) + " Fehler / " + fmt(o.ai.okLast7d) + " ok</div></div>" +
          "<div class='kpi'><div class='val'>" + escapeHtml(posFb.val) + "</div><div class='lbl'>Positives Feedback</div><div class='sub'>" + escapeHtml(posFb.sub) + "</div></div>";
      }

      function renderLineChart(byDay) {
        if (typeof Chart === "undefined") {
          showPanelErr("overviewErr", "Diagramm konnte nicht geladen werden.");
          return;
        }
        destroyChart();
        const labels = byDay.length ? byDay.map((d) => d.day) : ["(keine Daten)"];
        const totals = byDay.length ? byDay.map((d) => d.total) : [0];
        const errors = byDay.length ? byDay.map((d) => d.errors) : [0];
        const tick = "rgba(255,255,255,0.45)";
        const grid = "rgba(255,255,255,0.08)";
        chLineAi = new Chart($("chLineAi").getContext("2d"), {
          type: "line",
          data: {
            labels,
            datasets: [
              { label: "KI-Volumen", data: totals, borderColor: "#c8a96e", backgroundColor: "rgba(200,169,110,0.12)", fill: true, tension: 0.25, pointRadius: 2 },
              { label: "Fehler", data: errors, borderColor: "#e07a6a", backgroundColor: "rgba(224,122,106,0.1)", fill: true, tension: 0.25, pointRadius: 2 },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: tick, font: { size: 11 } } } },
            scales: {
              x: { ticks: { color: tick, maxRotation: 45 }, grid: { color: grid } },
              y: { ticks: { color: tick }, grid: { color: grid }, beginAtZero: true },
            },
          },
        });
      }

      async function loadOverview() {
        if (!authenticated) return;
        showPanelErr("overviewErr", "");
        const btn = $("btnOverview");
        btn.disabled = true;
        try {
          const pack = await fetchJson("/api/v1/admin/metrics/overview");
          const o = pack.overview;
          buildStatusLines(o);
          renderKpis(o);
          renderLineChart(o.ai.byDay || []);
        } catch (e) {
          if (authenticated) showPanelErr("overviewErr", String(e.message || e));
        } finally {
          btn.disabled = false;
        }
      }

      function aggregateKiRows(rows, epFilter) {
        const map = new Map();
        for (const r of rows) {
          if (epFilter && r.endpoint !== epFilter) continue;
          const key = r.day + "|" + r.endpoint;
          if (!map.has(key)) map.set(key, { day: r.day, endpoint: r.endpoint, calls: 0, errors: 0, tokens: 0, costUsd: 0 });
          const agg = map.get(key);
          agg.calls += r.count;
          if (r.status === "error") agg.errors += r.count;
          agg.tokens += r.totalSum;
          agg.costUsd += r.costUsd || 0;
        }
        return Array.from(map.values()).sort((a, b) => (a.day < b.day ? 1 : a.day > b.day ? -1 : a.endpoint.localeCompare(b.endpoint)));
      }

      function populateEndpointFilter(rows) {
        const eps = [...new Set(rows.map((r) => r.endpoint))].sort();
        const sel = $("epFilter");
        const cur = sel.value;
        sel.innerHTML = "<option value=''>Alle Endpoints</option>" + eps.map((e) => "<option value='" + escapeHtml(e) + "'>" + escapeHtml(e) + "</option>").join("");
        if (eps.includes(cur)) sel.value = cur;
      }

      function renderKiTable() {
        const rows = aggregateKiRows(kiRowsRaw, $("epFilter").value);
        if (!rows.length) { $("kiTable").innerHTML = "<p class='empty'>Keine Daten im Zeitraum.</p>"; return; }
        let sumCalls = 0, sumErr = 0, sumTok = 0, sumUsd = 0;
        let html = "<div class='table-wrap'><table><thead><tr><th>Datum</th><th>Endpoint</th><th>Calls</th><th>Fehler</th><th>Tokens</th><th>USD ~</th></tr></thead><tbody>";
        for (const r of rows) {
          sumCalls += r.calls; sumErr += r.errors; sumTok += r.tokens; sumUsd += r.costUsd;
          html += "<tr><td>" + escapeHtml(r.day) + "</td><td class='mono'>" + escapeHtml(r.endpoint) + "</td><td>" + r.calls + "</td><td>" + r.errors + "</td><td>" + fmt(r.tokens) + "</td><td>" + r.costUsd.toFixed(4) + "</td></tr>";
        }
        html += "<tr class='sum-row'><td colspan='2'>Summe</td><td>" + sumCalls + "</td><td>" + sumErr + "</td><td>" + fmt(sumTok) + "</td><td>" + sumUsd.toFixed(4) + "</td></tr></tbody></table></div>";
        $("kiTable").innerHTML = html;
      }

      async function loadKi() {
        if (!authenticated) return;
        showPanelErr("kiErr", "");
        const btn = $("btnKi");
        btn.disabled = true;
        try {
          const data = await fetchJson("/api/v1/admin/usage/daily?days=14");
          kiRowsRaw = data.rows || [];
          populateEndpointFilter(kiRowsRaw);
          renderKiTable();
        } catch (e) {
          if (authenticated) { showPanelErr("kiErr", String(e.message || e)); $("kiTable").innerHTML = ""; }
        } finally { btn.disabled = false; }
      }

      function displayNameLabel(name) {
        const t = (name || "").trim();
        return t ? escapeHtml(t) : "—";
      }

      function renderUserTable(users) {
        if (!users.length) { $("userResults").innerHTML = "<p class='empty'>Keine Treffer.</p>"; return; }
        let html = "<div class='table-wrap'><table><thead><tr><th>Name</th><th>Geräte-ID</th><th>Pro</th><th>Erstellt</th><th>Zuletzt aktiv</th></tr></thead><tbody>";
        for (const u of users) {
          html += "<tr class='clickable' data-iid='" + encodeURIComponent(u.installId) + "'><td>" + displayNameLabel(u.displayName) + "</td><td class='mono' title='" + escapeHtml(u.installId) + "'>" + escapeHtml(shortId(u.installId)) + "</td><td>" + (u.isPro ? "Pro" : "Free") + "</td><td>" + escapeHtml(fmtDate(u.createdAt)) + "</td><td>" + escapeHtml(fmtDate(u.lastSeenAt)) + "</td></tr>";
        }
        html += "</tbody></table></div>";
        $("userResults").innerHTML = html;
        document.querySelectorAll("#userResults tr.clickable").forEach((tr) => {
          tr.onclick = () => showUserDetail(decodeURIComponent(tr.getAttribute("data-iid") || ""));
        });
      }

      async function showUserDetail(installId) {
        selectedInstallId = installId;
        const panel = $("userDetail");
        panel.style.display = "block";
        panel.innerHTML = "<p class='hint'>Lade Details …</p>";
        showPanelErr("userSearchErr", "");
        try {
          const data = await fetchJson("/api/v1/admin/users/" + encodeURIComponent(installId));
          const u = data.user;
          const logs = (u.aiRequestLogs || []).slice(0, 30);
          let logHtml = "";
          for (const L of logs) {
            logHtml += "<tr><td class='mono'>" + escapeHtml(fmtDate(L.createdAt)) + "</td><td class='mono'>" + escapeHtml(L.endpoint) + "</td><td>" + escapeHtml(L.status) + "</td><td>" + (L.totalTokens ?? "—") + "</td></tr>";
          }
          panel.innerHTML =
            "<h3 style='margin:0 0 12px;color:var(--gold)'>Gerätedetails</h3>" +
            "<dl class='detail-grid'>" +
            "<dt>Name</dt><dd>" + displayNameLabel(u.displayName) + "</dd>" +
            "<dt>Geräte-ID</dt><dd class='mono'>" + escapeHtml(u.installId) + "</dd>" +
            "<dt>Interne ID</dt><dd class='mono'>" + escapeHtml(u.id) + "</dd>" +
            "<dt>Pro</dt><dd>" + (u.isPro ? "Ja" : "Nein") + "</dd>" +
            "<dt>Erstellt</dt><dd>" + escapeHtml(fmtDate(u.createdAt)) + "</dd>" +
            "<dt>Zuletzt aktiv</dt><dd>" + escapeHtml(fmtDate(u.lastSeenAt)) + "</dd>" +
            "<dt>Pro läuft ab</dt><dd>" + escapeHtml(fmtDate(u.proExpiresAt)) + "</dd>" +
            "<dt>Pro-Quelle</dt><dd>" + escapeHtml(u.entitlementSource || "—") + "</dd>" +
            "</dl>" +
            "<div class='row'>" +
            "<button type='button' class='btn btn-gold' id='btnProOn' style='width:auto'>Pro aktivieren</button>" +
            "<button type='button' class='btn btn-ghost' id='btnProOff'>Pro deaktivieren</button>" +
            "</div>" +
            "<h3 style='margin:16px 0 8px;font-size:0.9rem'>Letzte KI-Logs</h3>" +
            "<div class='table-wrap'><table><thead><tr><th>Zeit</th><th>Endpoint</th><th>Status</th><th>Tokens</th></tr></thead><tbody>" +
            (logHtml || "<tr><td colspan='4' class='empty'>Keine Logs</td></tr>") +
            "</tbody></table></div>";
          $("btnProOn").onclick = () => patchUserPro(true);
          $("btnProOff").onclick = () => patchUserPro(false);
        } catch (e) {
          panel.innerHTML = "";
          if (authenticated) showPanelErr("userSearchErr", String(e.message || e));
        }
      }

      async function patchUserPro(isPro) {
        if (!selectedInstallId || !authenticated) return;
        try {
          await fetchJson("/api/v1/admin/users/" + encodeURIComponent(selectedInstallId), { method: "PATCH", body: JSON.stringify({ isPro }) });
          showUserDetail(selectedInstallId);
        } catch (e) {
          if (authenticated) showPanelErr("userSearchErr", String(e.message || e));
        }
      }

      async function searchUsers() {
        if (!authenticated) return;
        showPanelErr("userSearchErr", "");
        $("userDetail").style.display = "none";
        const q = $("userQ").value.trim();
        if (!q) { showPanelErr("userSearchErr", "Bitte Suchbegriff eingeben."); return; }
        const btn = $("btnUserSearch");
        btn.disabled = true;
        try {
          const data = await fetchJson("/api/v1/admin/users/search?q=" + encodeURIComponent(q));
          renderUserTable(data.users || []);
        } catch (e) {
          if (authenticated) { showPanelErr("userSearchErr", String(e.message || e)); $("userResults").innerHTML = ""; }
        } finally { btn.disabled = false; }
      }

      function formatThumbRating(rating) {
        if (rating == null) return "—";
        if (rating === 1) return '<span class="thumb-rating up" title="Positiv">👍</span>';
        if (rating === -1) return '<span class="thumb-rating down" title="Negativ">👎</span>';
        return escapeHtml(String(rating));
      }

      function renderFeedbackTable() {
        const items = [...feedbackItems];
        items.sort((a, b) => {
          const da = new Date(a.createdAt).getTime();
          const db = new Date(b.createdAt).getTime();
          return fbSortAsc ? da - db : db - da;
        });
        if (!items.length) { $("fbTable").innerHTML = "<p class='empty'>Keine Feedbacks.</p>"; return; }
        const arrow = fbSortAsc ? " ↑" : " ↓";
        let html = "<div class='table-wrap'><table><thead><tr><th class='sortable' id='thFbDate'>Datum" + arrow + "</th><th>Screen</th><th>Bewertung</th><th>Kommentar</th></tr></thead><tbody>";
        for (const f of items) {
          const comment = f.comment ? escapeHtml(f.comment) : "<span style='color:var(--text-2)'>—</span>";
          html += "<tr><td class='mono'>" + escapeHtml(fmtDate(f.createdAt)) + "</td><td class='mono'>" + escapeHtml(f.screen || "—") + "</td><td>" + formatThumbRating(f.rating) + "</td><td>" + comment + "</td></tr>";
        }
        html += "</tbody></table></div>";
        $("fbTable").innerHTML = html;
        $("thFbDate").onclick = () => { fbSortAsc = !fbSortAsc; renderFeedbackTable(); };
      }

      async function loadFeedback() {
        if (!authenticated) return;
        showPanelErr("fbErr", "");
        const btn = $("btnFeedback");
        btn.disabled = true;
        try {
          const data = await fetchJson("/api/v1/admin/feedback?take=50");
          feedbackItems = data.items || [];
          renderFeedbackTable();
        } catch (e) {
          if (authenticated) { showPanelErr("fbErr", String(e.message || e)); $("fbTable").innerHTML = ""; }
        } finally { btn.disabled = false; }
      }

      async function checkHealth() {
        const pill = $("healthPill");
        pill.textContent = "Status …";
        pill.className = "pill idle";
        try {
          const res = await fetch(apiBase() + "/api/v1/health", { headers: { Accept: "application/json" } });
          if (!res.ok) throw new Error();
          pill.textContent = "API erreichbar";
          pill.className = "pill ok";
        } catch (_) {
          pill.textContent = "API nicht erreichbar";
          pill.className = "pill err";
        }
      }

      document.querySelectorAll("#nav button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const tab = btn.getAttribute("data-tab");
          document.querySelectorAll("#nav button").forEach((b) => b.classList.toggle("active", b === btn));
          document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
          $("panel-" + tab).classList.add("active");
        });
      });

      $("btnLogin").onclick = login;
      $("loginKey").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
      $("btnLogout").onclick = () => logout(false);
      $("btnOverview").onclick = loadOverview;
      $("btnKi").onclick = loadKi;
      $("epFilter").onchange = renderKiTable;
      $("btnUserSearch").onclick = searchUsers;
      $("userQ").addEventListener("keydown", (e) => { if (e.key === "Enter") searchUsers(); });
      $("btnFeedback").onclick = loadFeedback;

      tryAutoLogin();
    })();
  </script>
</body>
</html>
